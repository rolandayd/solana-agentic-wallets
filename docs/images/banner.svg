<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060b14"/>
      <stop offset="50%" style="stop-color:#0a1020"/>
      <stop offset="100%" style="stop-color:#060b14"/>
    </linearGradient>
    <linearGradient id="solGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#14F195"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#9945FF;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#14F195;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14F195;stop-opacity:0"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bannerBg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="900" height="200" fill="url(#dots)"/>

  <!-- Left decorative circuit lines -->
  <g opacity="0.15" stroke="#9945FF" stroke-width="1" fill="none">
    <line x1="0" y1="60" x2="80" y2="60"/>
    <line x1="80" y1="60" x2="100" y2="80"/>
    <line x1="100" y1="80" x2="100" y2="120"/>
    <line x1="100" y1="120" x2="80" y2="140"/>
    <line x1="80" y1="140" x2="0" y2="140"/>
    <circle cx="80" cy="60" r="3" fill="#9945FF" opacity="0.5"/>
    <circle cx="80" cy="140" r="3" fill="#9945FF" opacity="0.5"/>
    <line x1="0" y1="40" x2="60" y2="40"/>
    <line x1="60" y1="40" x2="70" y2="50"/>
    <line x1="0" y1="160" x2="60" y2="160"/>
    <line x1="60" y1="160" x2="70" y2="150"/>
  </g>

  <!-- Right decorative circuit lines -->
  <g opacity="0.15" stroke="#14F195" stroke-width="1" fill="none">
    <line x1="900" y1="60" x2="820" y2="60"/>
    <line x1="820" y1="60" x2="800" y2="80"/>
    <line x1="800" y1="80" x2="800" y2="120"/>
    <line x1="800" y1="120" x2="820" y2="140"/>
    <line x1="820" y1="140" x2="900" y2="140"/>
    <circle cx="820" cy="60" r="3" fill="#14F195" opacity="0.5"/>
    <circle cx="820" cy="140" r="3" fill="#14F195" opacity="0.5"/>
    <line x1="900" y1="40" x2="840" y2="40"/>
    <line x1="840" y1="40" x2="830" y2="50"/>
    <line x1="900" y1="160" x2="840" y2="160"/>
    <line x1="840" y1="160" x2="830" y2="150"/>
  </g>

  <!-- Glowing orb left -->
  <circle cx="150" cy="100" r="60" fill="#9945FF" opacity="0.04"/>
  <circle cx="150" cy="100" r="35" fill="#9945FF" opacity="0.04"/>

  <!-- Glowing orb right -->
  <circle cx="750" cy="100" r="60" fill="#14F195" opacity="0.04"/>
  <circle cx="750" cy="100" r="35" fill="#14F195" opacity="0.04"/>

  <!-- Solana ◎ symbol -->
  <text x="140" y="112" font-family="monospace" font-size="40" fill="url(#solGrad)" text-anchor="middle" opacity="0.25" filter="url(#textGlow)">◎</text>

  <!-- Main title -->
  <text x="450" y="82" font-family="'Courier New', 'JetBrains Mono', monospace" font-size="32" font-weight="700" fill="url(#solGrad)" text-anchor="middle" letter-spacing="2" filter="url(#textGlow)">SOLANA AGENTIC WALLET</text>

  <!-- Gradient line under title -->
  <rect x="150" y="92" width="600" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- Subtitle -->
  <text x="450" y="120" font-family="'Courier New', 'JetBrains Mono', monospace" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="3">AUTONOMOUS AI AGENTS · SOLANA DEVNET · AES-256-GCM</text>

  <!-- Status badges -->
  <rect x="242" y="138" width="90" height="22" rx="4" fill="#0a1e10" stroke="#14F195" stroke-width="1" opacity="0.9"/>
  <text x="287" y="153" font-family="'Courier New', monospace" font-size="9" fill="#14F195" text-anchor="middle" letter-spacing="1">● DEVNET LIVE</text>

  <rect x="342" y="138" width="90" height="22" rx="4" fill="#0a0a20" stroke="#9945FF" stroke-width="1" opacity="0.9"/>
  <text x="387" y="153" font-family="'Courier New', monospace" font-size="9" fill="#9945FF" text-anchor="middle" letter-spacing="1">4 AGENTS</text>

  <rect x="442" y="138" width="90" height="22" rx="4" fill="#0a1e10" stroke="#14F195" stroke-width="1" opacity="0.9"/>
  <text x="487" y="153" font-family="'Courier New', monospace" font-size="9" fill="#14F195" text-anchor="middle" letter-spacing="1">OPEN SOURCE</text>

  <rect x="542" y="138" width="116" height="22" rx="4" fill="#0a0a20" stroke="#9945FF" stroke-width="1" opacity="0.9"/>
  <text x="600" y="153" font-family="'Courier New', monospace" font-size="9" fill="#9945FF" text-anchor="middle" letter-spacing="1">MIT LICENSE</text>

  <!-- Bottom line -->
  <rect x="150" y="174" width="600" height="1" fill="url(#lineGrad)" rx="1" opacity="0.4"/>
  <text x="450" y="188" font-family="'Courier New', monospace" font-size="9" fill="#1e293b" text-anchor="middle" letter-spacing="2">BUILT FOR THE SOLANA AGENTIC WALLET BOUNTY · MARCH 2026</text>

</svg>
